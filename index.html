<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Hotel Website</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- FontAwesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- SweetAlert for popup -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Custom CSS -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVIGATION -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="#">Luxury Stay</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#booking">Booking</a></li>
        <li class="nav-item"><a class="nav-link" href="#gallery">Gallery</a></li>
        <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- HERO SECTION -->
<section class="hero d-flex align-items-center justify-content-center">
  <div class="overlay text-center">
    <h1>Luxury Stay Hotel</h1>
    <p>Experience comfort and elegance in every stay</p>
    <a href="#booking" class="btn btn-primary btn-lg mt-3">Book Now</a>
  </div>
</section>

<!-- BOOKING SECTION -->
<section id="booking" class="booking-section container my-5">
  <h2 class="text-center mb-4">Reserve Your Room</h2>
  <div class="booking-card mx-auto p-4 shadow-lg">

    <form id="bookingForm">

      <div class="row mb-3">
        <div class="col-md-6">
          <label><i class="fa-solid fa-calendar-days"></i> Check-in</label>
          <input type="date" id="checkin" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label><i class="fa-solid fa-calendar-check"></i> Check-out</label>
          <input type="date" id="checkout" class="form-control" required>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label><i class="fa-solid fa-bed"></i> Room Type</label>
          <select id="roomType" class="form-control" required>
            <option value="">Select Room</option>
            <option value="6000">Single Room (₹6,000/night)</option>
            <option value="9000">Double Room (₹9,000/night)</option>
            <option value="13500">Deluxe Room (₹13,500/night)</option>
            <option value="18000">Suite (₹18,000/night)</option>
          </select>
        </div>
        <div class="col-md-6">
          <label><i class="fa-solid fa-user"></i> Guests</label>
          <input type="number" id="guests" class="form-control" min="1" max="10" value="1" required>
        </div>
      </div>

      <div class="mb-3">
        <label><i class="fa-solid fa-note-sticky"></i> Special Requests</label>
        <textarea class="form-control" placeholder="Extra pillows, airport pickup, etc..."></textarea>
      </div>

      <div class="summary mb-3 d-flex justify-content-between">
        <p>Nights: <span id="nights">0</span></p>
        <p>Total Price: <span id="price">₹0</span></p>
      </div>

      <button type="submit" class="btn btn-primary w-100">Book Now</button>
    </form>
  </div>
</section>



<!-- CONTACT SECTION -->
<section id="contact" class="contact-section container my-5">
  <h2 class="text-center mb-4">Contact Us</h2>
  <div class="contact-card mx-auto p-4 shadow-lg rounded-4">

    <form>
      <div class="mb-3">
        <label><i class="fa-solid fa-user"></i> Name</label>
        <input type="text" class="form-control" placeholder="Your Name" required>
      </div>

      <div class="mb-3">
        <label><i class="fa-solid fa-envelope"></i> Email</label>
        <input type="email" class="form-control" placeholder="Your Email" required>
      </div>

      <div class="mb-3">
        <label><i class="fa-solid fa-comment"></i> Message</label>
        <textarea class="form-control" rows="4" placeholder="Your Message" required></textarea>
      </div>

      <button type="submit" class="btn btn-primary w-100">Send Message</button>
    </form>
  </div>
</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="script.js"></script>
</body>
</html>
